services:
  - type: web
    name: todo-api
    env: node
    plan: free
    rootDir: apps/api-gateway
    buildCommand: |
      cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @todo-app/shared build && pnpm --filter api-gateway build
    startCommand: |
      pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false

  - type: web
    name: todo-frontend
    env: node
    plan: free
    rootDir: apps/frontend
    buildCommand: |
      cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @todo-app/shared build && pnpm --filter frontend build
    startCommand: |
      pnpm exec next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://todo-frontend.onrender.com
      - key: AUTH_TRUST_HOST
        value: true
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://todo-api.onrender.com
